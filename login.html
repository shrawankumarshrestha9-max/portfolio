<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }
    .card h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .card p.sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 10px 12px; font-size: 14px;
      border: 1px solid #ccc; border-radius: 8px;
      outline: none; color: #111;
    }
    .field input:focus { border-color: #555; }
    .field input::placeholder { color: #aaa; }
    .btn {
      width: 100%; padding: 11px; font-size: 15px; font-weight: 600;
      background: #111; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; margin-top: 0.5rem;
    }
    .btn:hover { background: #333; }
    .links-row { display: flex; justify-content: space-between; margin-top: 1.25rem; }
    .links-row a { font-size: 13px; color: #555; text-decoration: none; }
    .links-row a:hover { color: #111; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your account</p>
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn">Sign in</button>
    <div class="links-row">
      <a href="forgot-password.html">Forgot password?</a>
      <a href="register.    html">Create account</a>
    </div>
  </div>
</body>
</html>
