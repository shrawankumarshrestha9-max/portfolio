<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }
    .card h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .card p.sub { font-size: 14px; color: #666; margin-bottom: 1.25rem; }
    .info-box {
      background: #f0f0f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #555;
      margin-bottom: 1rem;
    }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 10px 12px; font-size: 14px;
      border: 1px solid #ccc; border-radius: 8px;
      outline: none; color: #111;
    }
    .field input:focus { border-color: #555; }
    .field input::placeholder { color: #aaa; }
    .btn {
      width: 100%; padding: 11px; font-size: 15px; font-weight: 600;
      background: #111; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; margin-top: 0.5rem;
    }
    .btn:hover { background: #333; }
    .center-link { text-align: center; margin-top: 1.25rem; }
    .center-link a { font-size: 13px; color: #555; text-decoration: none; }
    .center-link a:hover { color: #111; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Forgot password?</h1>
    <p class="sub">Enter your email and we'll send you a reset link</p>
    <div class="info-box">
      ℹ️ Check your inbox after submitting
    </div>
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <button class="btn">Send reset link</button>
    <div class="center-link">
      <a href="login.html">← Back to sign in</a>
    </div>
  </div>
</body>
</html>
