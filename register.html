<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }
    .card h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .card p.sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 10px 12px; font-size: 14px;
      border: 1px solid #ccc; border-radius: 8px;
      outline: none; color: #111;
    }
    .field input:focus { border-color: #555; }
    .field input::placeholder { color: #aaa; }
    .btn {
      width: 100%; padding: 11px; font-size: 15px; font-weight: 600;
      background: #111; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; margin-top: 0.5rem;
    }
    .btn:hover { background: #333; }
    .center-link { text-align: center; margin-top: 1.25rem; }
    .center-link a { font-size: 13px; color: #555; text-decoration: none; }
    .center-link a:hover { color: #111; text-decoration: underline; }

    /* Success message box */
    .success-box {
      display: none;
      background: #e6f9ee;
      border: 1px solid #4caf50;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 1rem;
      text-align: center;
    }
    .success-box .tick {
      font-size: 32px;
      margin-bottom: 6px;
    }
    .success-box h2 {
      font-size: 16px;
      font-weight: 600;
      color: #2e7d32;
      margin-bottom: 4px;
    }
    .success-box p {
      font-size: 13px;
      color: #388e3c;
    }
    .success-box .countdown {
      font-size: 12px;
      color: #555;
      margin-top: 8px;
    }

    /* Error message */
    .error-box {
      display: none;
      background: #fff0f0;
      border: 1px solid #e57373;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #c62828;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create account</h1>
    <p class="sub">Sign up to get started</p>

    <!-- Success message (hidden by default) -->
    <div class="success-box" id="successBox">
      <div class="tick">✅</div>
      <h2>Account created!</h2>
      <p>Your account has been successfully created.</p>
      <div class="countdown" id="countdown">Redirecting to login in 3 seconds...</div>
    </div>

    <!-- Error message (hidden by default) -->
    <div class="error-box" id="errorBox"></div>

    <!-- Form fields -->
    <div id="formFields">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="John Doe">
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password">
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat password">
      </div>
      <button class="btn" onclick="createAccount()">Create account</button>
      <div class="center-link">
        <a href="login.html">Already have an account? Sign in</a>
      </div>
    </div>
  </div>

  <script>
    function createAccount() {
      var name     = document.getElementById('name').value.trim();
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var confirm  = document.getElementById('confirm').value;
      var errorBox = document.getElementById('errorBox');

      // Hide any previous error
      errorBox.style.display = 'none';
      errorBox.textContent   = '';

      // Validation checks
      if (!name) {
        showError('Please enter your full name.');
        return;
      }
      if (!email || !email.includes('@')) {
        showError('Please enter a valid email address.');
        return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }
      if (password !== confirm) {
        showError('Passwords do not match. Please try again.');
        return;
      }

      // All good — hide form, show success
      document.getElementById('formFields').style.display = 'none';
      document.getElementById('successBox').style.display = 'block';

      // Countdown and redirect
      var seconds = 3;
      var countdownEl = document.getElementById('countdown');
      var timer = setInterval(function () {
        seconds--;
        countdownEl.textContent = 'Redirecting to login in ' + seconds + ' second' + (seconds !== 1 ? 's' : '') + '...';
        if (seconds <= 0) {
          clearInterval(timer);
          window.location.href = 'login.html';
        }
      }, 1000);
    }

    function showError(msg) {
      var errorBox = document.getElementById('errorBox');
      errorBox.textContent   = '⚠️ ' + msg;
      errorBox.style.display = 'block';
    }
  </script>
</body>
</html>
